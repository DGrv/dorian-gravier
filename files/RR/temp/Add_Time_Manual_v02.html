<!doctype html>
<html>
<head><meta charset="utf-8"><title>Add Time</title></head>
<body>
<script>

<!-- Example : "https://dgrv.github.io/dorian-gravier/files/RR/temp/Marker_LED_IATF_2026.html?bib=1&api=https://api.raceresult.com/351313/KCCL3PE9ZAC0SY8KNFD3H125WM1QT7QM" -->
<!-- "https://dgrv.github.io/dorian-gravier/files/RR/temp/Add_Time_Manual_v02.html?api=https://api.raceresult.com/" & [Event.ID] & "/" & [Event.apiAddManual]&"&bib="&[Bib]&"&tp=MECANIC" -->
  (function(){
    // Get URL parameters
    const urlParams = new URLSearchParams(window.location.search);
    const api = urlParams.get('api');
    const bib = urlParams.get('bib');
    const tp = urlParams.get('tp');
    
    // Check if parameters exist
    if (!api || !bib) {
      document.body.innerHTML = '<h2>Error: Missing parameters</h2><p>Please provide both "api" and "bib" parameters in the URL.</p>';
      return;
    }
    
    // Calculate current time in seconds since midnight
    const n = new Date();
    const secs = n.getHours() * 3600 + n.getMinutes() * 60 + n.getSeconds();
    
    // Build the redirect URL
    const firstUrl = api + "?bib=" + bib + "&TimingPoint="+ tp + "&time=" + secs;
    
    // Redirect current tab immediately
    location.href = firstUrl;
  })();
</script>
</body>
</html>
