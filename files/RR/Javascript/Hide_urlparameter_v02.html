<script>


    const youridhtmlwidgethide = "#idwidget"

    // Explanation 
    document.addEventListener("DOMContentLoaded", function () {
        var widget = window.HTMLWidgets.find(youridhtmlwidgethide);

        if (widget) {
            var map = widget.getMap();

            if (map) {

                // Add URL help control
                var urlHelpControl = L.control({ position: 'bottomright' });
                urlHelpControl.onAdd = function (map) {
                    var div = L.DomUtil.create('div', 'leaflet-control-urlhelp');
                    div.style.backgroundColor = 'rgba(255, 255, 255, 1)';
                    div.style.boxShadow = '0 0 5px #bbb';
                    div.style.padding = '0 5px';
                    div.style.margin = '0';
                    div.style.color = '#1a1919';
                    div.style.font = '15px/1.5 "Helvetica Neue", Arial, Helvetica, sans-serif';
                    div.innerHTML = 'Add to URL ➜ Show only: ?show=0,1 | Hide: ?hide=2 | Base map: ?baselayer=1 | Combine: ?show=0&baselayer=1';
                    return div;
                };
                urlHelpControl.addTo(map);

            }
        }
    });





    // Function to get URL parameters
    function getUrlParameter(name) {
        name = name.replace(/[\[]/, '\\[').replace(/[\]]/, '\\]');
        var regex = new RegExp('[\\?&]' + name + '=([^&#]*)');
        var results = regex.exec(location.search);
        return results === null ? '' : decodeURIComponent(results[1].replace(/\+/g, ' '));
    }


    // -------------------------------------------------------------------------------------
    //                                         HIDE Parameters
    // -------------------------------------------------------------------------------------
    // Allow the user to use url parameter hide, to hide the layers :youridhtmlwidget
    // Hide 1 layer: ?hide=0
    // Hide mutiples layers: ?hide=1,3
    // show parameters is the same idea: show=1,4,4
    // and choose the map background with baselayer=4 e.g.

    // Wait for the map to be ready
    document.addEventListener('DOMContentLoaded', function () {
        setTimeout(function () {
            var widget = window.HTMLWidgets.find(youridhtmlwidgethide);
            if (widget) {
                var map = widget.getMap();

                if (map) {
                    // Get URL parameters
                    var hideOverlays = getUrlParameter('hide');
                    var showOverlays = getUrlParameter('show');
                    var showBaseLayer = getUrlParameter('baselayer'); // Index of base layer to show

                    // Extract OVERLAY group names from the layer control
                    var overlayGroupNames = [];
                    var overlaysList = document.querySelectorAll('.leaflet-control-layers-overlays label');
                    overlaysList.forEach(function (label) {
                        var groupName = label.textContent.trim();
                        if (groupName) {
                            overlayGroupNames.push(groupName);
                        }
                    });

                    // Extract BASE LAYER names from the layer control
                    var baseLayerNames = [];
                    var baseLayersList = document.querySelectorAll('.leaflet-control-layers-base label');
                    baseLayersList.forEach(function (label) {
                        var layerName = label.textContent.trim();
                        if (layerName) {
                            baseLayerNames.push(layerName);
                        }
                    });

                    var groupsToHide = [];

                    // Handle OVERLAYS - 'show' parameter
                    if (showOverlays) {
                        var indicesToShow = showOverlays.split(',').map(function (id) {
                            return parseInt(id.trim());
                        });

                        var groupsToShow = indicesToShow.map(function (index) {
                            return overlayGroupNames[index];
                        }).filter(Boolean);

                        // Hide all overlay groups that are NOT in the show list
                        groupsToHide = overlayGroupNames.filter(function (name) {
                            return groupsToShow.indexOf(name) === -1;
                        });
                    }
                    // Handle OVERLAYS - 'hide' parameter
                    else if (hideOverlays) {
                        var indicesToHide = hideOverlays.split(',').map(function (id) {
                            return parseInt(id.trim());
                        });

                        groupsToHide = indicesToHide.map(function (index) {
                            return overlayGroupNames[index];
                        }).filter(Boolean);
                    }

                    // Remove overlay layers
                    if (groupsToHide.length > 0) {
                        var layersToRemove = [];
                        map.eachLayer(function (layer) {
                            if (layer.options && layer.options.group && groupsToHide.indexOf(layer.options.group) !== -1) {
                                layersToRemove.push(layer);
                            }
                        });

                        layersToRemove.forEach(function (layer) {
                            map.removeLayer(layer);
                        });

                        // Uncheck the overlay checkboxes
                        groupsToHide.forEach(function (groupName) {
                            var checkboxes = document.querySelectorAll('.leaflet-control-layers-overlays .leaflet-control-layers-selector');
                            checkboxes.forEach(function (checkbox) {
                                var label = checkbox.parentElement.textContent.trim();
                                if (label === groupName) {
                                    checkbox.checked = false;
                                }
                            });
                        });
                    }

                    // Handle BASE LAYER selection
                    if (showBaseLayer) {
                        var baseLayerIndex = parseInt(showBaseLayer.trim());
                        var baseLayerToShow = baseLayerNames[baseLayerIndex];

                        if (baseLayerToShow) {
                            // Find and click the radio button for the desired base layer
                            var baseRadios = document.querySelectorAll('.leaflet-control-layers-base .leaflet-control-layers-selector');
                            baseRadios.forEach(function (radio) {
                                var label = radio.parentElement.textContent.trim();
                                if (label === baseLayerToShow) {
                                    // Trigger the change to switch base layers
                                    radio.click();
                                    // console.log('Switched to base layer:', baseLayerToShow);
                                }
                            });
                        }
                    }
                }
            }
        }, 500);
    });



</script>
